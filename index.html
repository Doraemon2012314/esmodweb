<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGFRP | Moderation Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px;
            color: #e1e4e8;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #8b949e;
            font-size: 14px;
            margin-top: 6px;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #161b22;
            border-radius: 12px;
            padding: 20px 24px;
            flex: 1;
            min-width: 140px;
            border: 1px solid #2d333b;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 13px;
            color: #8b949e;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Cards */
        .card {
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #2d333b;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        /* Search */
        .search-wrapper {
            padding: 18px 24px;
            border-bottom: 1px solid #2d333b;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .search-input::placeholder {
            color: #6e7681;
        }

        /* Filter buttons */
        .filter-group {
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #2d333b;
        }

        .filter-btn {
            background: #21262d;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #c9d1d9;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #30363d;
        }

        .filter-btn.active {
            background: #1f6feb;
            color: #fff;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #8b949e;
            background: #0d1117;
            border-bottom: 1px solid #2d333b;
        }

        td {
            padding: 14px 16px;
            font-size: 13px;
            border-bottom: 1px solid #2d333b;
            vertical-align: middle;
        }

        tr:hover td {
            background: #1c2128;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-warning {
            background: #d29922;
            color: #1c2128;
        }

        .badge-ban {
            background: #da3633;
            color: #fff;
        }

        .badge-tempban {
            background: #f0883e;
            color: #1c2128;
        }

        .badge-demotion {
            background: #6e40c9;
            color: #fff;
        }

        .badge-exploit {
            background: #8250df;
            color: #fff;
        }

        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-approved {
            background: #2ea043;
            color: #fff;
        }

        .status-denied {
            background: #da3633;
            color: #fff;
        }

        .status-pending {
            background: #d29922;
            color: #1c2128;
        }

        code {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            background: #0d1117;
            padding: 2px 6px;
            border-radius: 6px;
            color: #e1e4e8;
        }

        .moderator-list {
            padding: 16px 24px;
        }

        .mod-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2d333b;
        }

        .mod-item:last-child {
            border-bottom: none;
        }

        .mod-name {
            font-weight: 500;
            font-family: monospace;
            font-size: 13px;
        }

        .mod-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
        }

        .mod-stats span {
            color: #8b949e;
        }

        .mod-stats strong {
            color: #fff;
            margin-right: 4px;
        }

        .refresh-info {
            font-size: 12px;
            color: #6e7681;
            margin-top: 16px;
            text-align: right;
            border-top: 1px solid #2d333b;
            padding-top: 16px;
        }

        .btn-refresh {
            background: #21262d;
            border: 1px solid #2d333b;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            color: #c9d1d9;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-refresh:hover {
            background: #30363d;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #6e7681;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>Moderation Panel</h1>
        <p>Live case tracking for SGFRP</p>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-number" id="totalCases">0</div>
            <div class="stat-label">Total Cases</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="warnings">0</div>
            <div class="stat-label">Warnings</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="bans">0</div>
            <div class="stat-label">Bans</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="demotions">0</div>
            <div class="stat-label">Demotions</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="exploits">0</div>
            <div class="stat-label">Exploits</div>
        </div>
    </div>

    <!-- Cases Card -->
    <div class="card">
        <div class="card-header">
            <h2>Recent Cases</h2>
            <button class="btn-refresh" onclick="fetchData()">⟳ Refresh</button>
        </div>
        <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by case ID, target, or moderator..." onkeyup="searchCases()">
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all" onclick="filterCases('all')">All</button>
            <button class="filter-btn" data-filter="warning" onclick="filterCases('warning')">Warnings</button>
            <button class="filter-btn" data-filter="ban" onclick="filterCases('ban')">Bans</button>
            <button class="filter-btn" data-filter="tempban" onclick="filterCases('tempban')">Temp Bans</button>
            <button class="filter-btn" data-filter="demotion" onclick="filterCases('demotion')">Demotions</button>
            <button class="filter-btn" data-filter="exploit" onclick="filterCases('exploit')">Exploits</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Case ID</th>
                        <th>Type</th>
                        <th>Target</th>
                        <th>Moderator</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="casesBody">
                    <tr><td colspan="6" class="empty-state">Loading cases...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Moderators Card -->
    <div class="card">
        <div class="card-header">
            <h2>Top Moderators</h2>
        </div>
        <div id="moderatorsList" class="moderator-list">
            <div class="empty-state">Loading...</div>
        </div>
    </div>

    <div class="refresh-info" id="lastUpdated">
        Last updated: --
    </div>
</div>

<script>
    let allCases = [];
    let currentFilter = 'all';

    function getBadgeClass(type) {
        const map = {
            'warning': 'badge-warning',
            'ban': 'badge-ban',
            'tempban': 'badge-tempban',
            'demotion': 'badge-demotion',
            'exploit': 'badge-exploit'
        };
        return map[type] || 'badge-warning';
    }

    function getStatusClass(status) {
        if (!status || status === 'Awaiting' || status === 'Awaiting Approval') return 'status-pending';
        if (status === 'APPROVED') return 'status-approved';
        if (status && status.startsWith('DENIED')) return 'status-denied';
        return 'status-pending';
    }

    function formatStatus(status) {
        if (!status || status === 'Awaiting' || status === 'Awaiting Approval') return 'Pending';
        if (status === 'APPROVED') return 'Approved';
        if (status && status.startsWith('DENIED')) return 'Denied';
        return status || 'Pending';
    }

    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function displayCases(cases) {
        const tbody = document.getElementById('casesBody');
        if (!cases || cases.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No cases found</td></tr>';
            return;
        }

        tbody.innerHTML = cases.slice(0, 100).map(c => `
            <tr>
                <td><code>${escapeHtml(c.case_id || 'N/A')}</code></td>
                <td><span class="badge ${getBadgeClass(c.type)}">${escapeHtml(c.type || 'Unknown')}</span></td>
                <td>${escapeHtml(c.target || 'N/A')}</td>
                <td><code>${escapeHtml(c.moderator || 'N/A')}</code></td>
                <td><span class="status ${getStatusClass(c.status)}">${formatStatus(c.status)}</span></td>
                <td>${formatDate(c.timestamp)}</td>
            </tr>
        `).join('');
    }

    function displayModerators(mods) {
        const container = document.getElementById('moderatorsList');
        if (!mods || mods.length === 0) {
            container.innerHTML = '<div class="empty-state">No moderator data yet</div>';
            return;
        }

        container.innerHTML = mods.slice(0, 10).map(mod => `
            <div class="mod-item">
                <div class="mod-name"><code>${escapeHtml(mod.id || 'Unknown')}</code></div>
                <div class="mod-stats">
                    <span><strong>${mod.total || 0}</strong> total</span>
                    <span><strong>${mod.warnings || 0}</strong> warns</span>
                    <span><strong>${mod.bans || 0}</strong> bans</span>
                    <span><strong>${mod.demotions || 0}</strong> demos</span>
                    <span><strong>${mod.exploits || 0}</strong> exploits</span>
                </div>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function fetchData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            if (!response.ok) {
                throw new Error('data.json not found');
            }
            const data = await response.json();

            // Update stats
            document.getElementById('totalCases').innerText = data.total_cases || 0;
            document.getElementById('warnings').innerText = data.cases_by_type?.warning || 0;
            document.getElementById('bans').innerText = (data.cases_by_type?.ban || 0) + (data.cases_by_type?.tempban || 0);
            document.getElementById('demotions').innerText = data.cases_by_type?.demotion || 0;
            document.getElementById('exploits').innerText = data.cases_by_type?.exploit || 0;

            allCases = data.cases || [];
            displayCases(allCases);
            displayModerators(data.moderators || []);

            if (data.last_updated) {
                const date = new Date(data.last_updated);
                document.getElementById('lastUpdated').innerHTML = `Last updated: ${date.toLocaleString()}`;
            }
        } catch (err) {
            console.error(err);
            document.getElementById('casesBody').innerHTML = '<tr><td colspan="6" class="empty-state">Unable to load data. Make sure data.json exists.</td></tr>';
        }
    }

    function filterCases(type) {
        currentFilter = type;

        // Update active button styling
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.getAttribute('data-filter') === type) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        if (type === 'all') {
            displayCases(allCases);
        } else {
            const filtered = allCases.filter(c => c.type === type);
            displayCases(filtered);
        }
    }

    function searchCases() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        if (!keyword) {
            filterCases(currentFilter);
            return;
        }

        const filtered = allCases.filter(c => 
            (c.case_id && c.case_id.toLowerCase().includes(keyword)) ||
            (c.target && c.target.toLowerCase().includes(keyword)) ||
            (c.moderator && c.moderator.toLowerCase().includes(keyword))
        );
        displayCases(filtered);
    }

    // Initial load
    fetchData();

    // Auto refresh every 15 seconds
    setInterval(fetchData, 15000);
</script>
</body>
</html>
