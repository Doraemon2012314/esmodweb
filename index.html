<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SGFRP | Mod Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 20px;
            color: #e0e0e0;
        }

        /* Main container */
        .wrap {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header section */
        .top {
            margin-bottom: 28px;
            border-left: 4px solid #7c3aed;
            padding-left: 18px;
        }

        .top h1 {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .top p {
            color: #8b8ba0;
            font-size: 14px;
            margin-top: 6px;
        }

        /* Stats row */
        .stat-row {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #111127;
            border-radius: 16px;
            padding: 18px 22px;
            flex: 1;
            min-width: 130px;
            border: 1px solid #1e1e3a;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: #7c3aed;
            background: #14142e;
        }

        .stat-num {
            font-size: 34px;
            font-weight: 700;
            color: #a78bfa;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8b8ba0;
            margin-top: 8px;
        }

        /* Main card style */
        .card {
            background: #111127;
            border-radius: 16px;
            border: 1px solid #1e1e3a;
            margin-bottom: 26px;
            overflow: hidden;
        }

        .card-head {
            padding: 16px 22px;
            border-bottom: 1px solid #1e1e3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-head h2 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        /* Search box */
        .search-area {
            padding: 16px 22px;
            border-bottom: 1px solid #1e1e3a;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: #0a0a18;
            border: 1px solid #252545;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .search-input::placeholder {
            color: #5a5a7a;
        }

        /* Filter buttons */
        .filters {
            padding: 12px 22px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1e1e3a;
        }

        .filter-btn {
            background: #1a1a33;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #c4c4dd;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #2a2a4a;
        }

        .filter-btn.active {
            background: #7c3aed;
            color: #fff;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #a0a0c0;
            background: #0d0d20;
            border-bottom: 1px solid #1e1e3a;
        }

        td {
            padding: 14px 16px;
            font-size: 13px;
            border-bottom: 1px solid #1a1a35;
            vertical-align: middle;
        }

        tr:hover td {
            background: #16162f;
        }

        /* Badges */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .tag-warning {
            background: #d97706;
            color: #fff;
        }

        .tag-ban {
            background: #dc2626;
            color: #fff;
        }

        .tag-tempban {
            background: #ea580c;
            color: #fff;
        }

        .tag-demotion {
            background: #6d28d9;
            color: #fff;
        }

        .tag-exploit {
            background: #9333ea;
            color: #fff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-approved {
            background: #059669;
            color: #fff;
        }

        .status-denied {
            background: #dc2626;
            color: #fff;
        }

        .status-pending {
            background: #d97706;
            color: #fff;
        }

        code {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            background: #0a0a18;
            padding: 3px 8px;
            border-radius: 8px;
            color: #c084fc;
        }

        /* Moderator list */
        .mod-list {
            padding: 16px 22px;
        }

        .mod-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e1e3a;
            flex-wrap: wrap;
            gap: 12px;
        }

        .mod-item:last-child {
            border-bottom: none;
        }

        .mod-name {
            font-family: monospace;
            font-size: 13px;
            font-weight: 500;
        }

        .mod-stats {
            display: flex;
            gap: 18px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        .mod-stats span {
            color: #8b8ba0;
        }

        .mod-stats strong {
            color: #fff;
            margin-right: 4px;
        }

        /* Buttons */
        .btn-refresh {
            background: #1a1a33;
            border: 1px solid #2d2d55;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #c4c4dd;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-refresh:hover {
            background: #2a2a4a;
            border-color: #7c3aed;
        }

        .footer-note {
            font-size: 12px;
            color: #6a6a8a;
            text-align: right;
            padding-top: 16px;
            margin-top: 8px;
            border-top: 1px solid #1a1a35;
        }

        .empty-msg {
            text-align: center;
            padding: 48px 20px;
            color: #6a6a8a;
        }

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }
            .stat-num {
                font-size: 26px;
            }
            .stat-card {
                padding: 12px 16px;
            }
            th, td {
                padding: 10px 12px;
                font-size: 12px;
            }
            .mod-stats {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <!-- header -->
    <div class="top">
        <h1>mod panel</h1>
        <p>cases · warnings · bans · demotions</p>
    </div>

    <!-- stats row -->
    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-num" id="totalCases">0</div>
            <div class="stat-label">total cases</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="warnings">0</div>
            <div class="stat-label">warnings</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="bans">0</div>
            <div class="stat-label">bans</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="demotions">0</div>
            <div class="stat-label">demotions</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="exploits">0</div>
            <div class="stat-label">exploits</div>
        </div>
    </div>

    <!-- cases card -->
    <div class="card">
        <div class="card-head">
            <h2>recent cases</h2>
            <button class="btn-refresh" onclick="fetchData()">⟳ refresh</button>
        </div>
        <div class="search-area">
            <input type="text" class="search-input" id="searchInput" placeholder="search by case id, target, or moderator" onkeyup="searchCases()">
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="filterCases('all')">all</button>
            <button class="filter-btn" data-filter="warning" onclick="filterCases('warning')">warnings</button>
            <button class="filter-btn" data-filter="ban" onclick="filterCases('ban')">bans</button>
            <button class="filter-btn" data-filter="tempban" onclick="filterCases('tempban')">temp bans</button>
            <button class="filter-btn" data-filter="demotion" onclick="filterCases('demotion')">demotions</button>
            <button class="filter-btn" data-filter="exploit" onclick="filterCases('exploit')">exploits</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>case id</th>
                        <th>type</th>
                        <th>target</th>
                        <th>moderator</th>
                        <th>status</th>
                        <th>date</th>
                    </tr>
                </thead>
                <tbody id="casesBody">
                    <tr><td colspan="6" class="empty-msg">loading cases...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- moderators card -->
    <div class="card">
        <div class="card-head">
            <h2>top moderators</h2>
        </div>
        <div id="moderatorsList" class="mod-list">
            <div class="empty-msg">loading...</div>
        </div>
    </div>

    <div class="footer-note" id="lastUpdated">
        last updated: --
    </div>
</div>

<script>
    let allCases = [];
    let currentFilter = 'all';

    function getTagClass(type) {
        const map = {
            'warning': 'tag-warning',
            'ban': 'tag-ban',
            'tempban': 'tag-tempban',
            'demotion': 'tag-demotion',
            'exploit': 'tag-exploit'
        };
        return map[type] || 'tag-warning';
    }

    function getStatusClass(status) {
        if (!status || status === 'Awaiting' || status === 'Awaiting Approval') return 'status-pending';
        if (status === 'APPROVED') return 'status-approved';
        if (status && status.startsWith('DENIED')) return 'status-denied';
        return 'status-pending';
    }

    function formatStatusLabel(status) {
        if (!status || status === 'Awaiting' || status === 'Awaiting Approval') return 'pending';
        if (status === 'APPROVED') return 'approved';
        if (status && status.startsWith('DENIED')) return 'denied';
        return status || 'pending';
    }

    function formatShortDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function displayCases(cases) {
        const tbody = document.getElementById('casesBody');
        if (!cases || cases.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">no cases found</td></tr>';
            return;
        }

        let html = '';
        for (let i = 0; i < Math.min(cases.length, 100); i++) {
            const c = cases[i];
            html += `
                <tr>
                    <td><code>${escapeHtml(c.case_id || '?')}</code></td>
                    <td><span class="tag ${getTagClass(c.type)}">${escapeHtml(c.type || 'unknown')}</span></td>
                    <td>${escapeHtml(c.target || '?')}</td>
                    <td><code>${escapeHtml(c.moderator || '?')}</code></td>
                    <td><span class="status-badge ${getStatusClass(c.status)}">${formatStatusLabel(c.status)}</span></td>
                    <td>${formatShortDate(c.timestamp)}</td>
                </tr>
            `;
        }
        tbody.innerHTML = html;
    }

    function displayModerators(mods) {
        const container = document.getElementById('moderatorsList');
        if (!mods || mods.length === 0) {
            container.innerHTML = '<div class="empty-msg">no moderator data yet</div>';
            return;
        }

        let html = '';
        for (let i = 0; i < Math.min(mods.length, 10); i++) {
            const m = mods[i];
            html += `
                <div class="mod-item">
                    <div class="mod-name"><code>${escapeHtml(m.id || 'unknown')}</code></div>
                    <div class="mod-stats">
                        <span><strong>${m.total || 0}</strong> total</span>
                        <span><strong>${m.warnings || 0}</strong> warns</span>
                        <span><strong>${m.bans || 0}</strong> bans</span>
                        <span><strong>${m.demotions || 0}</strong> demos</span>
                        <span><strong>${m.exploits || 0}</strong> exploits</span>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    async function fetchData() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            if (!res.ok) throw new Error('data.json not found');
            const data = await res.json();

            // update stats
            document.getElementById('totalCases').innerText = data.total_cases || 0;
            document.getElementById('warnings').innerText = data.cases_by_type?.warning || 0;
            document.getElementById('bans').innerText = (data.cases_by_type?.ban || 0) + (data.cases_by_type?.tempban || 0);
            document.getElementById('demotions').innerText = data.cases_by_type?.demotion || 0;
            document.getElementById('exploits').innerText = data.cases_by_type?.exploit || 0;

            allCases = data.cases || [];
            displayCases(allCases);
            displayModerators(data.moderators || []);

            if (data.last_updated) {
                const d = new Date(data.last_updated);
                document.getElementById('lastUpdated').innerHTML = `last updated: ${d.toLocaleString()}`;
            }
        } catch (err) {
            console.warn(err);
            document.getElementById('casesBody').innerHTML = '<tr><td colspan="6" class="empty-msg">unable to load data — make sure data.json exists</td></tr>';
        }
    }

    function filterCases(type) {
        currentFilter = type;
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => {
            if (btn.getAttribute('data-filter') === type) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        if (type === 'all') {
            displayCases(allCases);
        } else {
            const filtered = allCases.filter(c => c.type === type);
            displayCases(filtered);
        }
    }

    function searchCases() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!keyword) {
            filterCases(currentFilter);
            return;
        }
        const filtered = allCases.filter(c =>
            (c.case_id && c.case_id.toLowerCase().includes(keyword)) ||
            (c.target && c.target.toLowerCase().includes(keyword)) ||
            (c.moderator && c.moderator.toLowerCase().includes(keyword))
        );
        displayCases(filtered);
    }

    // initial load + auto refresh every 15 seconds
    fetchData();
    setInterval(fetchData, 15000);
</script>
</body>
</html>
